name: Build and Push - Notion MCP

on:
  push:
    branches:
      - master
    paths:
      - 'notion/**'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./notion
          push: true
          tags: chamoouske/mcp-notion:latest,chamoouske/mcp-notion:${{ github.sha }}