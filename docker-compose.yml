version: '3.8'

services:
  notion-mcp:
    build:
      context: ./notion
      dockerfile: Dockerfile
    container_name: notion-mcp
    environment:
      - NOTION_API_KEY=${NOTION_API_KEY}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notion-mcp.rule=PathPrefix(`/mcp/notion`)"
      - "traefik.http.routers.notion-mcp.entrypoints=web"
      - "traefik.http.services.notion-mcp.loadbalancer.server.port=3001"
    restart: unless-stopped

  docker-mcp:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: docker-mcp
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docker-mcp.rule=PathPrefix(`/mcp/docker`)"
      - "traefik.http.routers.docker-mcp.entrypoints=web"
      - "traefik.http.services.docker-mcp.loadbalancer.server.port=3002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    privileged: true

networks:
  traefik:
    external: true