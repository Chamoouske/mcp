version: '3.8'

services:
  notion-mcp:
    build:
      context: ./notion
      dockerfile: Dockerfile
    container_name: notion-mcp
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NOTION_API_KEY=${NOTION_API_KEY}
    ports:
      - "3001:3001"
    restart: unless-stopped

  docker-mcp:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: docker-mcp
    environment:
      - NODE_ENV=production
      - PORT=3002
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3002:3002"
    restart: unless-stopped
    privileged: true