services:
  notion-mcp:
    build:
      context: ./notion
      dockerfile: Dockerfile
    container_name: notion-mcp
    environment:
      - NOTION_API_KEY=${NOTION_API_KEY}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notion-mcp.rule=PathPrefix(`/mcp/notion`)"
      - "traefik.http.routers.notion-mcp.middlewares=notion-mcp-stripprefix"
      - "traefik.http.middlewares.notion-mcp-stripprefix.stripprefix.prefixes=/mcp/notion"
      - "traefik.http.services.notion-mcp.loadbalancer.server.port=80"
    restart: unless-stopped

  docker-mcp:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: docker-mcp
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docker-mcp.rule=PathPrefix(`/mcp/docker`)"
      - "traefik.http.routers.docker-mcp.middlewares=docker-mcp-stripprefix"
      - "traefik.http.middlewares.docker-mcp-stripprefix.stripprefix.prefixes=/mcp/docker"
      - "traefik.http.services.docker-mcp.loadbalancer.server.port=80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    privileged: true

  traefik-mcp:
    build:
      context: ./traefik
      dockerfile: Dockerfile
    container_name: traefik-mcp
    environment:
      - TRAEFIK_API_URL=http://traefik:8080
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-mcp.rule=PathPrefix(`/mcp/traefik`)"
      - "traefik.http.routers.traefik-mcp.middlewares=traefik-mcp-stripprefix"
      - "traefik.http.middlewares.traefik-mcp-stripprefix.stripprefix.prefixes=/mcp/traefik"
      - "traefik.http.services.traefik-mcp.loadbalancer.server.port=80"
    restart: unless-stopped

  playwright-mcp:
    build:
      context: ./playwright
      dockerfile: Dockerfile
    container_name: playwright-mcp
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.playwright-mcp.rule=PathPrefix(`/mcp/playwright`)"
      - "traefik.http.routers.playwright-mcp.middlewares=playwright-mcp-stripprefix"
      - "traefik.http.middlewares.playwright-mcp-stripprefix.stripprefix.prefixes=/mcp/playwright"
      - "traefik.http.services.playwright-mcp.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  traefik:
    external: true